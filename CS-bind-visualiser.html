<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CS2 Bind Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #1e1e2e;
            color: #cdd6f4;
        }
        
        h2 { border-bottom: 2px solid #313244; padding-bottom: 10px; margin-bottom: 20px; }
        
        .controls-section {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #313244;
            border-radius: 8px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select, input[type="file"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #45475a;
            background-color: #181825;
            color: #cdd6f4;
            cursor: pointer;
        }

        /* Layout wrappers */
        .keyboard-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .main-board-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Blocks */
        .block {
            background-color: #181825;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .row { display: flex; gap: 8px; justify-content: center; }

        /* Key Styles */
        .key {
            width: 50px;
            height: 50px;
            background-color: #313244;
            border: 2px solid #45475a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            box-sizing: border-box;
            text-align: center;
            white-space: pre-line;
            line-height: 1.2;
        }
        .key:hover { background-color: #45475a; }
        .key.hidden { visibility: hidden; }

        /* Highlight bound keys */
        .key.bound {
            background-color: #89b4fa;
            color: #11111b;
            border-color: #74c7ec;
        }
        .key.bound:hover { background-color: #b4befe; }
        
        /* Special Keys */
        .key.tab { width: 75px; }
        .key.caps { width: 90px; }
        .key.shift { width: 115px; }
        .key.space { width: 300px; }
        .key.enter { width: 90px; }

        /* Numpad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            grid-template-rows: repeat(5, 50px);
            gap: 8px;
            background-color: #181825;
            padding: 15px;
            border-radius: 10px;
        }
        .key.tall { grid-row: span 2; height: 100%; }
        .key.wide { grid-column: span 2; width: 100%; }
        
        /* Tooltip */
        #tooltip {
            position: fixed;
            background: #f9e2af;
            color: #11111b;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 350px;
        }

        .section-label {
            font-size: 12px;
            color: #a6adc8;
            margin-bottom: -5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
    </style>
</head>

        // --- 3. APPLICATION LOGIC ---
        const cfgInput = document.getElementById('cfgInput');
        const layoutSwitch = document.getElementById('layoutSwitch');
        const tooltip = document.getElementById('tooltip');
        let binds = {}; 

        // Populate Layout Dropdown
        for (const [key, layout] of Object.entries(layoutsDB)) {
            const option = document.createElement('option');
            option.value = key;
            option.text = layout.name;
            if (key === 'qwerty_us') option.selected = true;
            layoutSwitch.appendChild(option);
        }

        // Initialize view
        updateKeyboardVisuals();
        setupTooltips();

        // Handle tooltips
        function setupTooltips() {
            document.querySelectorAll('.key').forEach(keyElement => {
                keyElement.addEventListener('mouseenter', (e) => {
                    const activeKey = keyElement.getAttribute('data-active-bind');
                    if (keyElement.classList.contains('bound') && activeKey && binds[activeKey]) {
                        tooltip.style.display = 'block';
                        tooltip.innerText = `bind "${activeKey}" "${binds[activeKey]}"`;
                    }
                });
                keyElement.addEventListener('mousemove', (e) => {
                    tooltip.style.left = e.clientX + 15 + 'px';
                    tooltip.style.top = e.clientY + 15 + 'px';
                });
                keyElement.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
            });
        }

        // Handle File Upload
        cfgInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                parseCFG(e.target.result);
                updateKeyboardBinds();
            };
            reader.readAsText(file);
        });

        // Handle Layout Switch
        layoutSwitch.addEventListener('change', function() {
            updateKeyboardVisuals();
            updateKeyboardBinds();
        });

        // Update Key Faces
        function updateKeyboardVisuals() {
            const currentLayout = layoutSwitch.value;
            const db = layoutsDB[currentLayout].keys;

            document.querySelectorAll('.dyn-key').forEach(key => {
                const code = key.getAttribute('data-code');
                if (db[code]) {
                    key.innerText = db[code][0]; // First item is the display text
                } else {
                    key.innerText = "";
                }
            });
        }

        // Parse CS2 CFG (with scancode awareness)
        function parseCFG(text) {
            binds = {}; 
            const lines = text.split('\n');
            for (let line of lines) {
                line = line.split('//')[0].trim();
                if (!line) continue;
                const match = line.match(/^bind\s+"?([^"\s]+)"?\s+"?(.*?)"?$/i);
                if (match) {
                    binds[match[1].toLowerCase()] = match[2];
                }
            }
        }

        // Map Binds to UI
        function updateKeyboardBinds() {
            const currentLayout = layoutSwitch.value;
            const db = layoutsDB[currentLayout].keys;

            document.querySelectorAll('.key').forEach(keyElement => {
                keyElement.classList.remove('bound');
                keyElement.removeAttribute('data-active-bind');

                let possibleBinds = [];

                if (keyElement.classList.contains('dyn-key')) {
                    const code = keyElement.getAttribute('data-code');
                    // Add physical hardware scancode
                    if (scancodes[code]) possibleBinds.push(scancodes[code]);
                    
                    // Add all possible text character mappings for this layout
                    if (db[code]) {
                        // Slice from index 1 to end (ignoring display text at index 0)
                        possibleBinds = possibleBinds.concat(db[code].slice(1)); 
                    }
                } else {
                    // Static keys (F-keys, Numpad, Mouse)
                    const staticBinds = keyElement.getAttribute('data-binds');
                    if (staticBinds) {
                        possibleBinds = possibleBinds.concat(staticBinds.split(' '));
                    }
                }

                // Check if any of our possible names exist in the user's CFG
                for (let keyName of possibleBinds) {
                    if (binds[keyName]) {
                        keyElement.classList.add('bound');
                        keyElement.setAttribute('data-active-bind', keyName);
                        break; 
                    }
                }
            });
        }
