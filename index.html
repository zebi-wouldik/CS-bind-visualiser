<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CS2 Bind Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding-bottom: 50px;
        }
        
        h2 { border-bottom: 2px solid #313244; padding-bottom: 10px; margin-bottom: 20px; }
        
        .controls-section {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #313244;
            border-radius: 8px;
            display: flex;
            gap: 40px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select, input[type="file"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #45475a;
            background-color: #181825;
            color: #cdd6f4;
            cursor: pointer;
            height: 35px;
            box-sizing: border-box;
        }

        #btnDownloadCfg {
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            background-color: #a6e3a1;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
            height: 35px;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }
        #btnDownloadCfg:hover {
            background-color: #94cc90;
        }

        .keyboard-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .main-board-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .block {
            background-color: #181825;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .row { display: flex; gap: 8px; justify-content: center; }

        .key {
            width: 50px;
            height: 50px;
            background-color: #313244;
            border: 2px solid #45475a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            box-sizing: border-box;
            text-align: center;
            white-space: pre-line;
            line-height: 1.2;
            flex-shrink: 0; /* Prevents shrinking on tight grids */
        }
        .key:hover { background-color: #45475a; }
        .key.hidden { visibility: hidden; pointer-events: none; }

        .key.bound {
            background-color: #89b4fa;
            color: #11111b;
            border-color: #74c7ec;
        }
        .key.bound:hover { background-color: #b4befe; }
        
        /* --- DYNAMIC KEYBOARD SHAPE STYLES --- */
        .main-keyboard .row {
            justify-content: flex-start; 
            width: 870px; /* Fixed width to force alignment */
        }
        
        /* Auto-fill the end of rows */
        .main-keyboard .row .key:last-child {
            flex-grow: 1; 
            max-width: 140px; 
        }
        
        /* Default Sizes */
        .key.backspace { width: 100px; }
        .key.tab { width: 80px; }
        .key.caps { width: 95px; }
        .key.enter { width: 100px; }
        .key.shift-l { width: 125px; }
        .key.shift-r { width: 125px; }
        .key.space { width: 350px; }

        /* Dynamic Layout Toggles */
        .layout-ansi .iso-only { display: none !important; }
        .layout-iso .ansi-only { display: none !important; }

        .layout-iso .key.shift-l { width: 50px; } /* Short shift */
        .layout-iso .key.enter { width: 80px; } /* Bottom of ISO enter */

        /* Numpad & Others */
        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            grid-template-rows: repeat(5, 50px);
            gap: 8px;
            background-color: #181825;
            padding: 15px;
            border-radius: 10px;
        }
        .key.tall { grid-row: span 2; height: 100%; }
        .key.wide { grid-column: span 2; width: 100%; }
        
        #tooltip {
            position: fixed;
            background: #f9e2af;
            color: #11111b;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 350px;
        }

        .section-label { font-size: 12px; color: #a6adc8; margin-bottom: -5px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

        /* Raw Editor & Modal */
        .editor-section { margin-top: 40px; background-color: #313244; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .editor-section h3 { margin: 0; padding-bottom: 10px; border-bottom: 1px solid #45475a; }
        #cfgEditor { width: 100%; height: 250px; background-color: #11111b; color: #a6e3a1; border: 1px solid #45475a; border-radius: 6px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: vertical; box-sizing: border-box; outline: none; }
        #cfgEditor:focus { border-color: #cba6f7; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 17, 27, 0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal { background-color: #181825; border: 2px solid #cba6f7; border-radius: 8px; padding: 25px; width: 350px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .modal h3 { margin: 0; color: #cba6f7; border: none; padding: 0; }
        .modal p { margin: 0; font-size: 12px; color: #a6adc8; margin-top: -10px; }
        .modal input { width: 100%; box-sizing: border-box; padding: 12px; font-family: 'Courier New', Courier, monospace; background-color: #11111b; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; outline: none; }
        .modal input:focus { border-color: #89b4fa; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .modal-buttons button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background-color: #313244; color: #cdd6f4; transition: background-color 0.2s; }
        .modal-buttons button:hover { background-color: #45475a; }
        .modal-buttons button#btnSave { background-color: #a6e3a1; color: #11111b; }
        .modal-buttons button#btnSave:hover { background-color: #94cc90; }
        .modal-buttons button#btnUnbind { background-color: #f38ba8; color: #11111b; margin-right: auto; }
        .modal-buttons button#btnUnbind:hover { background-color: #d97d96; }
    </style>
</head>
<body>

    <h2>Ultimate CS2 Bind Visualizer</h2>
    
    <div class="controls-section">
        <div class="control-group">
            <label for="cfgInput"><strong>1. Upload Configuration (.cfg)</strong></label>
            <input type="file" id="cfgInput" accept=".cfg,.txt">
        </div>
        <div class="control-group">
            <label for="layoutSwitch"><strong>2. Keyboard Layout Database</strong></label>
            <select id="layoutSwitch">
            </select>
        </div>
        <div class="control-group" style="margin-left: auto;">
            <label><strong>3. Export Configuration</strong></label>
            <button id="btnDownloadCfg">Download .cfg</button>
        </div>
    </div>

    <div id="tooltip"></div>

    <div class="keyboard-wrapper">
        <div class="main-board-container">
            <div class="block f-keys">
                <div class="row" style="justify-content: flex-start;">
                    <div class="key static-key" data-binds="escape esc">Esc</div>
                    <div style="width: 25px;"></div>
                    <div class="key static-key" data-binds="f1">F1</div>
                    <div class="key static-key" data-binds="f2">F2</div>
                    <div class="key static-key" data-binds="f3">F3</div>
                    <div class="key static-key" data-binds="f4">F4</div>
                    <div style="width: 15px;"></div>
                    <div class="key static-key" data-binds="f5">F5</div>
                    <div class="key static-key" data-binds="f6">F6</div>
                    <div class="key static-key" data-binds="f7">F7</div>
                    <div class="key static-key" data-binds="f8">F8</div>
                    <div style="width: 15px;"></div>
                    <div class="key static-key" data-binds="f9">F9</div>
                    <div class="key static-key" data-binds="f10">F10</div>
                    <div class="key static-key" data-binds="f11">F11</div>
                    <div class="key static-key" data-binds="f12">F12</div>
                </div>
            </div>

            <div class="block main-keyboard layout-ansi">
                <div class="row">
                    <div class="key dyn-key" data-code="Backquote"></div>
                    <div class="key dyn-key" data-code="Digit1"></div>
                    <div class="key dyn-key" data-code="Digit2"></div>
                    <div class="key dyn-key" data-code="Digit3"></div>
                    <div class="key dyn-key" data-code="Digit4"></div>
                    <div class="key dyn-key" data-code="Digit5"></div>
                    <div class="key dyn-key" data-code="Digit6"></div>
                    <div class="key dyn-key" data-code="Digit7"></div>
                    <div class="key dyn-key" data-code="Digit8"></div>
                    <div class="key dyn-key" data-code="Digit9"></div>
                    <div class="key dyn-key" data-code="Digit0"></div>
                    <div class="key dyn-key" data-code="Minus"></div>
                    <div class="key dyn-key" data-code="Equal"></div>
                    <div class="key backspace static-key" data-binds="backspace">Backspace</div>
                </div>
                <div class="row">
                    <div class="key tab static-key" data-binds="tab">Tab</div>
                    <div class="key dyn-key" data-code="KeyQ"></div>
                    <div class="key dyn-key" data-code="KeyW"></div>
                    <div class="key dyn-key" data-code="KeyE"></div>
                    <div class="key dyn-key" data-code="KeyR"></div>
                    <div class="key dyn-key" data-code="KeyT"></div>
                    <div class="key dyn-key" data-code="KeyY"></div>
                    <div class="key dyn-key" data-code="KeyU"></div>
                    <div class="key dyn-key" data-code="KeyI"></div>
                    <div class="key dyn-key" data-code="KeyO"></div>
                    <div class="key dyn-key" data-code="KeyP"></div>
                    <div class="key dyn-key" data-code="BracketLeft"></div>
                    <div class="key dyn-key" data-code="BracketRight"></div>
                    <div class="key dyn-key ansi-only" data-code="Backslash"></div> <div class="key enter iso-only static-key" data-binds="enter return">Enter</div> </div>
                <div class="row">
                    <div class="key caps static-key" data-binds="caps capslock">Caps</div>
                    <div class="key dyn-key" data-code="KeyA"></div>
                    <div class="key dyn-key" data-code="KeyS"></div>
                    <div class="key dyn-key" data-code="KeyD"></div>
                    <div class="key dyn-key" data-code="KeyF"></div>
                    <div class="key dyn-key" data-code="KeyG"></div>
                    <div class="key dyn-key" data-code="KeyH"></div>
                    <div class="key dyn-key" data-code="KeyJ"></div>
                    <div class="key dyn-key" data-code="KeyK"></div>
                    <div class="key dyn-key" data-code="KeyL"></div>
                    <div class="key dyn-key" data-code="Semicolon"></div>
                    <div class="key dyn-key" data-code="Quote"></div>
                    <div class="key dyn-key iso-only" data-code="Backslash"></div> <div class="key enter static-key" data-binds="enter return">Enter</div> </div>
                <div class="row">
                    <div class="key shift-l static-key" data-binds="shift">Shift</div>
                    <div class="key dyn-key iso-only" data-code="IntlBackslash"></div> <div class="key dyn-key" data-code="KeyZ"></div>
                    <div class="key dyn-key" data-code="KeyX"></div>
                    <div class="key dyn-key" data-code="KeyC"></div>
                    <div class="key dyn-key" data-code="KeyV"></div>
                    <div class="key dyn-key" data-code="KeyB"></div>
                    <div class="key dyn-key" data-code="KeyN"></div>
                    <div class="key dyn-key" data-code="KeyM"></div>
                    <div class="key dyn-key" data-code="Comma"></div>
                    <div class="key dyn-key" data-code="Period"></div>
                    <div class="key dyn-key" data-code="Slash"></div>
                    <div class="key shift-r static-key" data-binds="rshift">Shift</div>
                </div>
                <div class="row" style="justify-content: center;">
                    <div class="key static-key" data-binds="ctrl">Ctrl</div>
                    <div class="key static-key" data-binds="alt">Alt</div>
                    <div class="key space static-key" data-binds="space">Space</div>
                    <div class="key static-key" data-binds="altgr ralt">AltGr</div>
                    <div class="key static-key" data-binds="rctrl">Ctrl</div>
                </div>
            </div>
        </div>

        <div>
            <div class="block" style="margin-bottom: 15px; margin-top: 65px;">
                <div class="row">
                    <div class="key static-key" data-binds="ins insert">Ins</div>
                    <div class="key static-key" data-binds="home">Home</div>
                    <div class="key static-key" data-binds="pgup">PgUp</div>
                </div>
                <div class="row">
                    <div class="key static-key" data-binds="del delete">Del</div>
                    <div class="key static-key" data-binds="end">End</div>
                    <div class="key static-key" data-binds="pgdn">PgDn</div>
                </div>
            </div>

            <div class="block">
                <div class="row">
                    <div class="key hidden"></div>
                    <div class="key static-key" data-binds="uparrow">▲</div>
                    <div class="key hidden"></div>
                </div>
                <div class="row">
                    <div class="key static-key" data-binds="leftarrow">◀</div>
                    <div class="key static-key" data-binds="downarrow">▼</div>
                    <div class="key static-key" data-binds="rightarrow">▶</div>

            </div>
        </div>

        <div>
            <div class="numpad" style="margin-top: 65px;">
                <div class="key static-key" data-binds="numlock">Num</div>
                <div class="key static-key" data-binds="kp_slash kp_divide">/</div>
                <div class="key static-key" data-binds="kp_multiply">*</div>
                <div class="key static-key" data-binds="kp_minus">-</div>
                
                <div class="key static-key" data-binds="kp_home kp_7">7</div>
                <div class="key static-key" data-binds="kp_uparrow kp_8">8</div>
                <div class="key static-key" data-binds="kp_pgup kp_9">9</div>
                <div class="key tall static-key" data-binds="kp_plus">+</div>
                
                <div class="key static-key" data-binds="kp_leftarrow kp_4">4</div>
                <div class="key static-key" data-binds="kp_5">5</div>
                <div class="key static-key" data-binds="kp_rightarrow kp_6">6</div>

                <div class="key static-key" data-binds="kp_downarrow kp_2">2</div>
                <div class="key static-key" data-binds="kp_pgdn kp_3">3</div>
                <div class="key tall static-key" data-binds="kp_enter">Ent</div>
                
                <div class="key wide static-key" data-binds="kp_ins kp_0">0</div>
                <div class="key static-key" data-binds="kp_del kp_dot">.</div>
            </div>
        </div>

        <div>
            <div class="block" style="margin-top: 65px;">
                <div class="section-label">Mouse</div>
                <div class="row">
                    <div class="key static-key" data-binds="mouse4">M4</div>
                    <div class="key static-key" data-binds="mwheelup">WU</div>
                    <div class="key static-key" data-binds="mouse5">M5</div>
                </div>
                <div class="row">
                    <div class="key static-key" data-binds="mouse1">M1</div>
                    <div class="key static-key" data-binds="mouse3">M3</div>
                    <div class="key static-key" data-binds="mouse2">M2</div>
                </div>
                <div class="row">
                    <div class="key hidden"></div>
                    <div class="key static-key" data-binds="mwheeldown">WD</div>
                    <div class="key hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="editor-section">
        <h3>Raw Configuration File</h3>
        <textarea id="cfgEditor" spellcheck="false" placeholder="// Upload a file, start typing here, or click a key above to generate binds..."></textarea>
    </div>

    <div id="bindModalOverlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">Edit Bind</h3>
            <p id="modalKeyInfo"></p>
            <input type="text" id="modalBindInput" placeholder="e.g. +jump">
            <div class="modal-buttons">
                <button id="btnUnbind">Unbind</button>
                <button id="btnCancel">Cancel</button>
                <button id="btnSave">Save</button>
            </div>
        </div>
    </div>

        const cfgInput = document.getElementById('cfgInput');
        const layoutSwitch = document.getElementById('layoutSwitch');
        const tooltip = document.getElementById('tooltip');
        const cfgEditor = document.getElementById('cfgEditor');
        const btnDownloadCfg = document.getElementById('btnDownloadCfg');
        
        let binds = {}; 
        let loadedFileName = "cs2_binds.cfg"; 

        for (const [key, layout] of Object.entries(layoutsDB)) {
            const option = document.createElement('option');
            option.value = key;
            option.text = layout.name;
            if (key === 'qwerty_us') option.selected = true;
            layoutSwitch.appendChild(option);
        }

        cfgInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            loadedFileName = file.name; 
            
            const reader = new FileReader();
            reader.onload = function(e) {
                cfgEditor.value = e.target.result;
                parseCFG(e.target.result);
                updateKeyboardBinds();
            };
            reader.readAsText(file);
        });

        btnDownloadCfg.addEventListener('click', function() {
            const cfgText = cfgEditor.value;
            const blob = new Blob([cfgText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = loadedFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        layoutSwitch.addEventListener('change', function() {
            updateKeyboardVisuals();
            updateKeyboardBinds();
        });

        cfgEditor.addEventListener('input', function() {
            parseCFG(cfgEditor.value);
            updateKeyboardBinds();
        });

        function updateKeyboardVisuals() {
            const currentLayout = layoutSwitch.value;
            const layoutObj = layoutsDB[currentLayout];
            const db = layoutObj.keys;
            const type = layoutObj.type || "ansi";

            // Toggle CSS classes to physically adjust the layout shape!
            const mk = document.querySelector('.main-keyboard');
            if (type === 'iso') {
                mk.classList.remove('layout-ansi');
                mk.classList.add('layout-iso');
            } else {
                mk.classList.remove('layout-iso');
                mk.classList.add('layout-ansi');
            }

            document.querySelectorAll('.dyn-key').forEach(key => {
                const code = key.getAttribute('data-code');
                if (db[code]) {
                    key.innerText = db[code][0]; 
                } else {
                    key.innerText = "";
                }
            });
        }

        function parseCFG(text) {
            binds = {}; 
            const lines = text.split('\n');
            for (let line of lines) {
                line = line.split('//')[0].trim();
                if (!line) continue;
                const match = line.match(/^bind\s+"?([^"\s]+)"?\s+"?(.*?)"?$/i);
                if (match) {
                    binds[match[1].toLowerCase()] = match[2];
                }
            }
        }

        function getPossibleBindNames(keyElement) {
            let possibleBinds = [];
            const currentLayout = layoutSwitch.value;
            const db = layoutsDB[currentLayout].keys;

            if (keyElement.classList.contains('dyn-key')) {
                const code = keyElement.getAttribute('data-code');
                if (scancodes[code]) possibleBinds.push(scancodes[code]);
                if (db[code]) {
                    possibleBinds = possibleBinds.concat(db[code].slice(1)); 
                }
            } else {
                const staticBinds = keyElement.getAttribute('data-binds');
                if (staticBinds) {
                    possibleBinds = possibleBinds.concat(staticBinds.split(' '));
                }
            }
            return possibleBinds;
        }

        function updateKeyboardBinds() {
            document.querySelectorAll('.key').forEach(keyElement => {
                keyElement.classList.remove('bound');
                keyElement.removeAttribute('data-active-bind');

                let possibleBinds = getPossibleBindNames(keyElement);

                for (let keyName of possibleBinds) {
                    if (binds[keyName.toLowerCase()]) {
                        keyElement.classList.add('bound');
                        keyElement.setAttribute('data-active-bind', keyName.toLowerCase());
                        break; 
                    }
                }
            });
        }

        function setupTooltips() {
            document.querySelectorAll('.key').forEach(keyElement => {
                keyElement.addEventListener('mouseenter', (e) => {
                    if (keyElement.classList.contains('hidden') || keyElement.style.display === 'none') return;
                    const activeKey = keyElement.getAttribute('data-active-bind');
                    if (keyElement.classList.contains('bound') && activeKey && binds[activeKey.toLowerCase()]) {
                        tooltip.style.display = 'block';
                        tooltip.innerText = `bind "${activeKey}" "${binds[activeKey.toLowerCase()]}"\n\n(Click to edit)`;
                    } else {
                        tooltip.style.display = 'block';
                        tooltip.innerText = `(Click to bind)`;
                    }
                });
                keyElement.addEventListener('mousemove', (e) => {
                    tooltip.style.left = e.clientX + 15 + 'px';
                    tooltip.style.top = e.clientY + 15 + 'px';
                });
                keyElement.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
            });
        }

        const modalOverlay = document.getElementById('bindModalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalKeyInfo = document.getElementById('modalKeyInfo');
        const modalBindInput = document.getElementById('modalBindInput');
        const btnSave = document.getElementById('btnSave');
        const btnUnbind = document.getElementById('btnUnbind');
        const btnCancel = document.getElementById('btnCancel');
        let currentEditingKeyElement = null;

        function setupModal() {
            document.querySelectorAll('.key').forEach(keyElement => {
                keyElement.addEventListener('click', () => {
                    if (keyElement.classList.contains('hidden')) return;

                    currentEditingKeyElement = keyElement;
                    tooltip.style.display = 'none';
                    
                    let primaryName = "";
                    if (keyElement.classList.contains('dyn-key')) {
                        const code = keyElement.getAttribute('data-code');
                        const db = layoutsDB[layoutSwitch.value].keys;
                        primaryName = (db[code] && db[code][1]) ? db[code][1] : scancodes[code];
                    } else {
                        primaryName = keyElement.getAttribute('data-binds').split(' ')[0];
                    }

                    let displayTitle = keyElement.innerText.split('\n')[0].trim();
                    if (!displayTitle) displayTitle = primaryName.toUpperCase();

                    modalTitle.innerText = `Edit Bind: ${displayTitle}`;
                    modalKeyInfo.innerText = `Target Key: "${primaryName}"`;

                    const activeBind = keyElement.getAttribute('data-active-bind');
                    if (activeBind && binds[activeBind.toLowerCase()]) {
                        modalBindInput.value = binds[activeBind.toLowerCase()];
                    } else {
                        modalBindInput.value = '';
                    }

                    modalOverlay.style.display = 'flex';
                    modalBindInput.focus();
                });
            });

            btnCancel.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            modalBindInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') btnSave.click();
            });

            btnSave.addEventListener('click', () => {
                if (!currentEditingKeyElement) return;
                modifyRawCFG(currentEditingKeyElement, modalBindInput.value.trim() || null);
            });

            btnUnbind.addEventListener('click', () => {
                if (!currentEditingKeyElement) return;
                modifyRawCFG(currentEditingKeyElement, null);
            });
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
            currentEditingKeyElement = null;
            modalBindInput.value = '';
        }

        function modifyRawCFG(keyElement, newCommand) {
            let lines = cfgEditor.value.split(/\r?\n/);
            const possibleBinds = getPossibleBindNames(keyElement).map(b => b.toLowerCase());
            
            let primaryName = "";
            if (keyElement.classList.contains('dyn-key')) {
                const code = keyElement.getAttribute('data-code');
                const db = layoutsDB[layoutSwitch.value].keys;
                primaryName = (db[code] && db[code][1]) ? db[code][1] : scancodes[code];
            } else {
                primaryName = keyElement.getAttribute('data-binds').split(' ')[0];
            }

            let newLines = [];
            let bindUpdated = false;
            let unbindInjected = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let lineTrimmed = line.trim();
                
                if (lineTrimmed.toLowerCase().startsWith('unbind ')) {
                    const match = lineTrimmed.match(/^unbind\s+"?([^"\s]+)"?(\s*\/\/.*)?$/i);
                    if (match) {
                        const unboundKey = match[1].toLowerCase();
                        if (possibleBinds.includes(unboundKey)) {
                            continue; 
                        }
                    }
                }

                if (lineTrimmed.toLowerCase().startsWith('bind ')) {
                    const match = lineTrimmed.match(/^bind\s+"?([^"\s]+)"?\s+"?(.*?)"?(\s*\/\/.*)?$/i);
                    if (match) {
                        const boundKey = match[1].toLowerCase();
                        if (possibleBinds.includes(boundKey)) {
                            if (newCommand && !bindUpdated) {
                                let comment = match[3] || '';
                                newLines.push(`unbind "${primaryName}"`);
                                newLines.push(`bind "${primaryName}" "${newCommand}"${comment}`);
                                bindUpdated = true;
                                unbindInjected = true;
                            } else if (!newCommand && !unbindInjected) {
                                newLines.push(`unbind "${primaryName}"`);
                                unbindInjected = true;
                            }
                            continue;
                        }
                    }
                }
                newLines.push(line);
            }

            if (newCommand && !bindUpdated) {
                if (newLines.length > 0 && newLines[newLines.length - 1].trim() !== '') {
                    newLines.push(""); 
                }
                newLines.push(`unbind "${primaryName}"`);
                newLines.push(`bind "${primaryName}" "${newCommand}"`);
            } else if (!newCommand && !unbindInjected) {
                if (newLines.length > 0 && newLines[newLines.length - 1].trim() !== '') {
                    newLines.push(""); 
                }
                newLines.push(`unbind "${primaryName}"`);
            }

            const newText = newLines.join('\n');
            cfgEditor.value = newText;
            parseCFG(newText);
            updateKeyboardBinds();
            closeModal();
        }

        // INIT
        updateKeyboardVisuals();
        setupTooltips();
        setupModal();

    </script>
