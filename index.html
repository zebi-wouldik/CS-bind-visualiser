<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CS2 Bind Visualizer - Dual Sync</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding-bottom: 50px;
            margin: 0;
        }
        
        h2 { border-bottom: 2px solid #313244; padding-bottom: 10px; margin-bottom: 20px; }
        
        .global-controls {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #313244;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        select, input[type="file"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #45475a;
            background-color: #181825;
            color: #cdd6f4;
            cursor: pointer;
            height: 35px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            height: 35px;
            transition: all 0.2s;
            box-sizing: border-box;
            color: #11111b;
        }

        .btn-toggle-compare { background-color: #cba6f7; }
        .btn-toggle-compare:hover { background-color: #b4befe; }
        .btn-download { background-color: #89b4fa; }
        .btn-download:hover { background-color: #74c7ec; }

        /* --- LEGEND --- */
        .legend-container {
            display: none;
            background-color: #181825;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #45475a;
            margin-bottom: 20px;
            gap: 20px;
            justify-content: center;
            font-size: 13px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .legend-box { width: 16px; height: 16px; border-radius: 4px; border: 2px solid transparent; }
        
        .c-match { background-color: #89b4fa; color: #11111b; }
        .c-added { background-color: #a6e3a1; color: #11111b; }
        .c-conflict { background-color: #f9e2af; color: #11111b; }
        .c-missing { border-color: #f38ba8; background-color: transparent; }

        /* --- DUAL PANE LAYOUT --- */
        .split-view {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .pane {
            flex: 1;
            min-width: 900px; 
            background-color: #181825;
            border: 2px solid #313244;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.3s ease;
        }

        #paneB { display: none; border-color: #cba6f7; }

        .pane-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #45475a; padding-bottom: 15px; }
        .pane-header h3 { margin: 0; color: #cdd6f4; font-family: 'Courier New', Courier, monospace; }
        .pane-actions { display: flex; gap: 10px; }

        /* --- KEYBOARD STYLES --- */
        .keyboard-wrapper { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; justify-content: center; transform-origin: top left; }
        .main-board-container { display: flex; flex-direction: column; gap: 15px; }
        .block { background-color: #11111b; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; justify-content: center; }

        .key {
            width: 50px; height: 50px;
            background-color: #313244; border: 2px solid #45475a; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; cursor: pointer;
            transition: all 0.2s; user-select: none; box-sizing: border-box;
            text-align: center; white-space: pre-line; line-height: 1.2; flex-shrink: 0;
            color: #cdd6f4;
        }
        .key:hover { opacity: 0.8; transform: scale(1.05); z-index: 10; }
        .key.hidden { visibility: hidden; pointer-events: none; }

        /* Base bound (Normal mode) */
        .key.bound { background-color: #89b4fa; color: #11111b; border-color: #74c7ec; }
        
        /* Compare Mode Colors */
        .key.diff-match { background-color: #89b4fa; color: #11111b; border-color: #74c7ec; }
        .key.diff-added { background-color: #a6e3a1; color: #11111b; border-color: #94cc90; }
        .key.diff-conflict { background-color: #f9e2af; color: #11111b; border-color: #f5c2e7; }
        .key.diff-missing { border-color: #f38ba8; color: #f38ba8; border-style: dashed; }

        /* Layout Sizes */
        .main-keyboard .row { justify-content: flex-start; width: 870px; }
        .main-keyboard .row .key:last-child { flex-grow: 1; max-width: 140px; }
        .key.backspace { width: 100px; } .key.tab { width: 80px; } .key.caps { width: 95px; }
        .key.enter { width: 100px; } .key.shift-l { width: 125px; } .key.shift-r { width: 125px; } .key.space { width: 350px; }

        .layout-ansi .iso-only { display: none !important; }
        .layout-iso .ansi-only { display: none !important; }
        .layout-iso .key.shift-l { width: 50px; } 
        .layout-iso .key.enter { width: 80px; } 

        .numpad { display: grid; grid-template-columns: repeat(4, 50px); grid-template-rows: repeat(5, 50px); gap: 8px; background-color: #11111b; padding: 15px; border-radius: 10px; }
        .key.tall { grid-row: span 2; height: 100%; }
        .key.wide { grid-column: span 2; width: 100%; }

        .section-label { font-size: 12px; color: #a6adc8; margin-bottom: -5px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

        /* --- TEXTAREAS --- */
        textarea {
            width: 100%; height: 250px;
            background-color: #11111b; color: #cdd6f4;
            border: 1px solid #45475a; border-radius: 6px;
            padding: 15px; font-family: 'Courier New', Courier, monospace;
            font-size: 14px; resize: vertical; box-sizing: border-box; outline: none;
        }
        textarea:focus { border-color: #89b4fa; }
        #editorB { color: #f5c2e7; } 

        /* --- TOOLTIP & MODAL --- */
        #tooltip {
            position: fixed; background: #313244; color: #cdd6f4;
            padding: 10px 15px; border-radius: 6px; font-weight: bold; font-family: monospace;
            pointer-events: none; display: none; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #cba6f7;
            white-space: pre-wrap; word-wrap: break-word; max-width: 400px;
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 17, 27, 0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal { background-color: #181825; border: 2px solid #cba6f7; border-radius: 8px; padding: 25px; width: 350px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .modal h3 { margin: 0; color: #cba6f7; }
        .modal p { margin: 0; font-size: 12px; color: #a6adc8; margin-top: -10px; }
        .modal input { width: 100%; box-sizing: border-box; padding: 12px; font-family: monospace; background-color: #11111b; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; outline: none; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .btn-save-bind { background-color: #a6e3a1 !important; color: #11111b !important; }
        .btn-unbind { background-color: #f38ba8 !important; color: #11111b !important; margin-right: auto; }

        /* Compare Copy Button */
        #compareQuickActions { display: none; margin-bottom: 5px; }
        #btnCopyFromOther { width: 100%; background-color: #89b4fa; color: #11111b; font-size: 13px; padding: 10px; border-radius: 4px; transition: background-color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #btnCopyFromOther:hover { background-color: #74c7ec; }

    </style>
</head>
<body>

    <h2>Ultimate CS2 Bind Visualizer - Live Diff Mode</h2>
    
    <div class="global-controls">
        <div class="control-group">
            <label for="layoutSwitch"><strong>Base Keyboard Layout</strong></label>
            <select id="layoutSwitch"></select>
        </div>
        <div class="control-group" style="margin-left: auto;">
            <label><strong>Config Comparator</strong></label>
            <button id="btnToggleCompare" class="btn-toggle-compare">Enable Compare Mode</button>
        </div>
    </div>

    <div class="legend-container" id="legendContainer">
        <div class="legend-item"><div class="legend-box c-match"></div> Match</div>
        <div class="legend-item"><div class="legend-box c-conflict"></div> Different Action (Conflict)</div>
        <div class="legend-item"><div class="legend-box c-added"></div> Assigned Only Here</div>
        <div class="legend-item"><div class="legend-box c-missing"></div> Missing (Assigned in other)</div>
    </div>

    <div id="tooltip"></div>

    <div class="split-view">
        <div class="pane" id="paneA">
            <div class="pane-header">
                <h3 id="titleA">config_A.cfg</h3>
                <div class="pane-actions">
                    <input type="file" id="uploadA" accept=".cfg,.txt">
                    <button class="btn-download" id="downloadA">Export File</button>
                </div>
            </div>
            <div class="keyboard-wrapper" id="kbWrapA"></div>
            <textarea id="editorA" spellcheck="false" placeholder="// Paste or type your config here..."></textarea>
        </div>

        <div class="pane" id="paneB">
            <div class="pane-header">
                <h3 id="titleB">config_B.cfg</h3>
                <div class="pane-actions">
                    <input type="file" id="uploadB" accept=".cfg,.txt">
                    <button class="btn-download" id="downloadB">Export File</button>
                </div>
            </div>
            <div class="keyboard-wrapper" id="kbWrapB"></div>
            <textarea id="editorB" spellcheck="false" placeholder="// Paste or type your config here..."></textarea>
        </div>
    </div>

    <div id="bindModalOverlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">Edit Bind</h3>
            <p id="modalKeyInfo"></p>
            <p id="modalPaneInfo" style="color: #f9e2af; font-weight: bold; margin-bottom: 5px;"></p>
            
            <div id="compareQuickActions">
                <button id="btnCopyFromOther">⏬ Copy from other config</button>
            </div>

            <input type="text" id="modalBindInput" placeholder="e.g. +jump">
            <div class="modal-buttons">
                <button id="btnUnbind" class="btn-unbind">Unbind</button>
                <button id="btnCancel">Cancel</button>
                <button id="btnSave" class="btn-save-bind">Save</button>
            </div>
        </div>
    </div>

    <template id="keyboardTemplate">
        <div class="main-board-container">
            <div class="block f-keys">
                <div class="row" style="justify-content: flex-start;">
                    <div class="key static-key" data-binds="escape esc">Esc</div>
                    <div style="width: 25px;"></div>
                    <div class="key static-key" data-binds="f1">F1</div><div class="key static-key" data-binds="f2">F2</div><div class="key static-key" data-binds="f3">F3</div><div class="key static-key" data-binds="f4">F4</div>
                    <div style="width: 15px;"></div>
                    <div class="key static-key" data-binds="f5">F5</div><div class="key static-key" data-binds="f6">F6</div><div class="key static-key" data-binds="f7">F7</div><div class="key static-key" data-binds="f8">F8</div>
                    <div style="width: 15px;"></div>
                    <div class="key static-key" data-binds="f9">F9</div><div class="key static-key" data-binds="f10">F10</div><div class="key static-key" data-binds="f11">F11</div><div class="key static-key" data-binds="f12">F12</div>
                </div>
            </div>

            <div class="block main-keyboard layout-ansi">
                <div class="row">
                    <div class="key dyn-key" data-code="Backquote"></div><div class="key dyn-key" data-code="Digit1"></div><div class="key dyn-key" data-code="Digit2"></div><div class="key dyn-key" data-code="Digit3"></div><div class="key dyn-key" data-code="Digit4"></div><div class="key dyn-key" data-code="Digit5"></div><div class="key dyn-key" data-code="Digit6"></div><div class="key dyn-key" data-code="Digit7"></div><div class="key dyn-key" data-code="Digit8"></div><div class="key dyn-key" data-code="Digit9"></div><div class="key dyn-key" data-code="Digit0"></div><div class="key dyn-key" data-code="Minus"></div><div class="key dyn-key" data-code="Equal"></div><div class="key backspace static-key" data-binds="backspace">Backspace</div>
                </div>
                <div class="row">
                    <div class="key tab static-key" data-binds="tab">Tab</div><div class="key dyn-key" data-code="KeyQ"></div><div class="key dyn-key" data-code="KeyW"></div><div class="key dyn-key" data-code="KeyE"></div><div class="key dyn-key" data-code="KeyR"></div><div class="key dyn-key" data-code="KeyT"></div><div class="key dyn-key" data-code="KeyY"></div><div class="key dyn-key" data-code="KeyU"></div><div class="key dyn-key" data-code="KeyI"></div><div class="key dyn-key" data-code="KeyO"></div><div class="key dyn-key" data-code="KeyP"></div><div class="key dyn-key" data-code="BracketLeft"></div><div class="key dyn-key" data-code="BracketRight"></div><div class="key dyn-key ansi-only" data-code="Backslash"></div><div class="key enter iso-only static-key" data-binds="enter return">Enter</div>
                </div>
                <div class="row">
                    <div class="key caps static-key" data-binds="caps capslock">Caps</div><div class="key dyn-key" data-code="KeyA"></div><div class="key dyn-key" data-code="KeyS"></div><div class="key dyn-key" data-code="KeyD"></div><div class="key dyn-key" data-code="KeyF"></div><div class="key dyn-key" data-code="KeyG"></div><div class="key dyn-key" data-code="KeyH"></div><div class="key dyn-key" data-code="KeyJ"></div><div class="key dyn-key" data-code="KeyK"></div><div class="key dyn-key" data-code="KeyL"></div><div class="key dyn-key" data-code="Semicolon"></div><div class="key dyn-key" data-code="Quote"></div><div class="key dyn-key iso-only" data-code="Backslash"></div><div class="key enter static-key" data-binds="enter return">Enter</div>
                </div>
                <div class="row">
                    <div class="key shift-l static-key" data-binds="shift">Shift</div><div class="key dyn-key iso-only" data-code="IntlBackslash"></div><div class="key dyn-key" data-code="KeyZ"></div><div class="key dyn-key" data-code="KeyX"></div><div class="key dyn-key" data-code="KeyC"></div><div class="key dyn-key" data-code="KeyV"></div><div class="key dyn-key" data-code="KeyB"></div><div class="key dyn-key" data-code="KeyN"></div><div class="key dyn-key" data-code="KeyM"></div><div class="key dyn-key" data-code="Comma"></div><div class="key dyn-key" data-code="Period"></div><div class="key dyn-key" data-code="Slash"></div><div class="key shift-r static-key" data-binds="rshift">Shift</div>
                </div>
                <div class="row" style="justify-content: center;">
                    <div class="key static-key" data-binds="ctrl">Ctrl</div><div class="key static-key" data-binds="alt">Alt</div><div class="key space static-key" data-binds="space">Space</div><div class="key static-key" data-binds="altgr ralt">AltGr</div><div class="key static-key" data-binds="rctrl">Ctrl</div>
                </div>
            </div>
        </div>
        <div>
            <div class="block" style="margin-bottom: 15px; margin-top: 65px;">
                <div class="row"><div class="key static-key" data-binds="ins insert">Ins</div><div class="key static-key" data-binds="home">Home</div><div class="key static-key" data-binds="pgup">PgUp</div></div>
                <div class="row"><div class="key static-key" data-binds="del delete">Del</div><div class="key static-key" data-binds="end">End</div><div class="key static-key" data-binds="pgdn">PgDn</div></div>
            </div>
            <div class="block">
                <div class="row"><div class="key hidden"></div><div class="key static-key" data-binds="uparrow">▲</div><div class="key hidden"></div></div>
                <div class="row"><div class="key static-key" data-binds="leftarrow">◀</div><div class="key static-key" data-binds="downarrow">▼</div><div class="key static-key" data-binds="rightarrow">▶</div></div>
            </div>
        </div>
        <div>
            <div class="numpad" style="margin-top: 65px;">
                <div class="key static-key" data-binds="numlock">Num</div><div class="key static-key" data-binds="kp_slash kp_divide">/</div><div class="key static-key" data-binds="kp_multiply">*</div><div class="key static-key" data-binds="kp_minus">-</div>
                <div class="key static-key" data-binds="kp_home kp_7">7</div><div class="key static-key" data-binds="kp_uparrow kp_8">8</div><div class="key static-key" data-binds="kp_pgup kp_9">9</div><div class="key tall static-key" data-binds="kp_plus">+</div>
                <div class="key static-key" data-binds="kp_leftarrow kp_4">4</div><div class="key static-key" data-binds="kp_5">5</div><div class="key static-key" data-binds="kp_rightarrow kp_6">6</div>
                <div class="key static-key" data-binds="kp_end kp_1">1</div><div class="key static-key" data-binds="kp_downarrow kp_2">2</div><div class="key static-key" data-binds="kp_pgdn kp_3">3</div><div class="key tall static-key" data-binds="kp_enter">Ent</div>
                <div class="key wide static-key" data-binds="kp_ins kp_0">0</div><div class="key static-key" data-binds="kp_del kp_dot">.</div>
            </div>
        </div>
        <div>
            <div class="block" style="margin-top: 65px;">
                <div class="section-label">Mouse</div>
                <div class="row"><div class="key static-key" data-binds="mouse4">M4</div><div class="key static-key" data-binds="mwheelup">WU</div><div class="key static-key" data-binds="mouse5">M5</div></div>
                <div class="row"><div class="key static-key" data-binds="mouse1">M1</div><div class="key static-key" data-binds="mouse3">M3</div><div class="key static-key" data-binds="mouse2">M2</div></div>
                <div class="row"><div class="key hidden"></div><div class="key static-key" data-binds="mwheeldown">WD</div><div class="key hidden"></div></div>
            </div>
        </div>
    </template>

    <script>

            "IntlBackslash": "scancode100", "KeyZ": "scancode29", "KeyX": "scancode27", "KeyC": "scancode6", "KeyV": "scancode25", "KeyB": "scancode5", "KeyN": "scancode17", "KeyM": "scancode16", "Comma": "scancode54", "Period": "scancode55", "Slash": "scancode56"
        };

        const layoutsDB = {
            "qwerty_us": { name: "QWERTY (US ANSI)", type: "ansi", keys: { "Backquote": ["~ `", "`", "~"], "Digit1": ["1 !", "1"], "Digit2": ["2 @", "2"], "Digit3": ["3 #", "3"], "Digit4": ["4 $", "4"], "Digit5": ["5 %", "5"], "Digit6": ["6 ^", "6"], "Digit7": ["7 &", "7"], "Digit8": ["8 *", "8"], "Digit9": ["9 (", "9"], "Digit0": ["0 )", "0"], "Minus": ["- _", "-"], "Equal": ["= +", "="], "KeyQ": ["Q", "q"], "KeyW": ["W", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Y", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["[ {", "["], "BracketRight": ["] }", "]"], "KeyA": ["A", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["; :", ";"], "Quote": ["' \"", "'"], "Backslash": ["\\ |", "\\"], "IntlBackslash": ["< >", "<", ">"], "KeyZ": ["Z", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": ["M", "m"], "Comma": [", <", ","], "Period": [". >", "."], "Slash": ["/ ?", "/"] } },
            "qwerty_uk": { name: "QWERTY (UK ISO)", type: "iso", keys: { "Backquote": ["` ¬", "`"], "Digit1": ["1 !", "1"], "Digit2": ["2 \"", "2"], "Digit3": ["3 £", "3"], "Digit4": ["4 $", "4"], "Digit5": ["5 %", "5"], "Digit6": ["6 ^", "6"], "Digit7": ["7 &", "7"], "Digit8": ["8 *", "8"], "Digit9": ["9 (", "9"], "Digit0": ["0 )", "0"], "Minus": ["- _", "-"], "Equal": ["= +", "="], "KeyQ": ["Q", "q"], "KeyW": ["W", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Y", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["[ {", "["], "BracketRight": ["] }", "]"], "KeyA": ["A", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["; :", ";"], "Quote": ["' @", "'"], "Backslash": ["# ~", "#"], "IntlBackslash": ["\\ |", "\\"], "KeyZ": ["Z", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": ["M", "m"], "Comma": [", <", ","], "Period": [". >", "."], "Slash": ["/ ?", "/"] } },
            "azerty_fr": { name: "AZERTY (France)", type: "iso", keys: { "Backquote": ["²", "²"], "Digit1": ["& 1", "1", "&"], "Digit2": ["é 2", "2", "é"], "Digit3": ["\" 3", "3", "\""], "Digit4": ["' 4", "4", "'"], "Digit5": ["( 5", "5", "("], "Digit6": ["- 6", "6", "-"], "Digit7": ["è 7", "7", "è"], "Digit8": ["_ 8", "8", "_"], "Digit9": ["ç 9", "9", "ç"], "Digit0": ["à 0", "0", "à"], "Minus": [") °", ")"], "Equal": ["= +", "="], "KeyQ": ["A", "a", "q"], "KeyW": ["Z", "z", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Y", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["^ ¨", "^", "["], "BracketRight": ["$ £", "$", "]"], "KeyA": ["Q", "q", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["M", "m", ";"], "Quote": ["ù %", "ù", "'"], "Backslash": ["* µ", "*", "\\"], "IntlBackslash": ["< >", "<", ">"], "KeyZ": ["W", "w", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": [", ?", ","], "Comma": ["; .", ";"], "Period": [": /", ":"], "Slash": ["! §", "!"] } },
            "azerty_be": { name: "AZERTY (Belgium)", type: "iso", keys: { "Backquote": ["² ³", "²"], "Digit1": ["& 1", "1", "&"], "Digit2": ["é 2", "2", "é"], "Digit3": ["\" 3", "3", "\""], "Digit4": ["' 4", "4", "'"], "Digit5": ["( 5", "5", "("], "Digit6": ["§ 6", "6", "§"], "Digit7": ["è 7", "7", "è"], "Digit8": ["! 8", "8", "!"], "Digit9": ["ç 9", "9", "ç"], "Digit0": ["à 0", "0", "à"], "Minus": [") °", ")"], "Equal": ["- _", "-"], "KeyQ": ["A", "a", "q"], "KeyW": ["Z", "z", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Y", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["^ ¨", "^", "["], "BracketRight": ["$ *", "$", "]"], "KeyA": ["Q", "q", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["M", "m", ";"], "Quote": ["ù %", "ù", "'"], "Backslash": ["µ £", "µ", "\\"], "IntlBackslash": ["< >", "<", ">"], "KeyZ": ["W", "w", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": [", ?", ","], "Comma": ["; .", ";"], "Period": [": /", ":"], "Slash": ["= +", "="] } },
            "qwertz_de": { name: "QWERTZ (Germany)", type: "iso", keys: { "Backquote": ["^ °", "^"], "Digit1": ["1 !", "1"], "Digit2": ["2 \"", "2"], "Digit3": ["3 §", "3"], "Digit4": ["4 $", "4"], "Digit5": ["5 %", "5"], "Digit6": ["6 &", "6"], "Digit7": ["7 /", "7"], "Digit8": ["8 (", "8"], "Digit9": ["9 )", "9"], "Digit0": ["0 =", "0"], "Minus": ["ß ?", "ß"], "Equal": ["´ `", "´"], "KeyQ": ["Q", "q"], "KeyW": ["W", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Z", "z", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["Ü", "ü", "["], "BracketRight": ["+ *", "+", "]"], "KeyA": ["A", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["Ö", "ö", ";"], "Quote": ["Ä", "ä", "'"], "Backslash": ["# '", "#", "\\"], "IntlBackslash": ["< >", "<", ">"], "KeyZ": ["Y", "y", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": ["M", "m"], "Comma": [", ;", ","], "Period": [". :", "."], "Slash": ["- _", "-"] } },
            "qwerty_es": { name: "QWERTY (Spanish)", type: "iso", keys: { "Backquote": ["º ª", "º"], "Digit1": ["1 !", "1"], "Digit2": ["2 \"", "2"], "Digit3": ["3 ·", "3"], "Digit4": ["4 $", "4"], "Digit5": ["5 %", "5"], "Digit6": ["6 &", "6"], "Digit7": ["7 /", "7"], "Digit8": ["8 (", "8"], "Digit9": ["9 )", "9"], "Digit0": ["0 =", "0"], "Minus": ["' ?", "'"], "Equal": ["¡ ¿", "¡"], "KeyQ": ["Q", "q"], "KeyW": ["W", "w"], "KeyE": ["E", "e"], "KeyR": ["R", "r"], "KeyT": ["T", "t"], "KeyY": ["Y", "y"], "KeyU": ["U", "u"], "KeyI": ["I", "i"], "KeyO": ["O", "o"], "KeyP": ["P", "p"], "BracketLeft": ["` ^", "`", "["], "BracketRight": ["+ *", "+", "]"], "KeyA": ["A", "a"], "KeyS": ["S", "s"], "KeyD": ["D", "d"], "KeyF": ["F", "f"], "KeyG": ["G", "g"], "KeyH": ["H", "h"], "KeyJ": ["J", "j"], "KeyK": ["K", "k"], "KeyL": ["L", "l"], "Semicolon": ["Ñ", "ñ", ";"], "Quote": ["´ ¨", "´", "'"], "Backslash": ["ç Ç", "ç", "\\"], "IntlBackslash": ["< >", "<", ">"], "KeyZ": ["Z", "z"], "KeyX": ["X", "x"], "KeyC": ["C", "c"], "KeyV": ["V", "v"], "KeyB": ["B", "b"], "KeyN": ["N", "n"], "KeyM": ["M", "m"], "Comma": [", ;", ","], "Period": [". :", "."], "Slash": ["- _", "-"] } }
        };

        // --- APP STATE ---
        let state = {
            compareMode: false,
            A: { binds: {}, fileName: 'config_A.cfg', kbId: 'kbWrapA', editorId: 'editorA' },
            B: { binds: {}, fileName: 'config_B.cfg', kbId: 'kbWrapB', editorId: 'editorB' }
        };

        // --- DOM ELEMENTS ---
        const layoutSwitch = document.getElementById('layoutSwitch');
        const btnToggleCompare = document.getElementById('btnToggleCompare');
        const legendContainer = document.getElementById('legendContainer');
        const tooltip = document.getElementById('tooltip');
        const paneB = document.getElementById('paneB');

        // Inject Keyboards
        const template = document.getElementById('keyboardTemplate');
        document.getElementById('kbWrapA').appendChild(template.content.cloneNode(true));
        document.getElementById('kbWrapB').appendChild(template.content.cloneNode(true));

        // Init UI
        for (const [key, layout] of Object.entries(layoutsDB)) {
            const option = document.createElement('option');
            option.value = key; option.text = layout.name;
            if (key === 'qwerty_us') option.selected = true;
            layoutSwitch.appendChild(option);
        }

        // --- EVENT LISTENERS ---
        layoutSwitch.addEventListener('change', updateAllVisuals);
        
        btnToggleCompare.addEventListener('click', () => {
            state.compareMode = !state.compareMode;
            if (state.compareMode) {
                paneB.style.display = 'flex';
                legendContainer.style.display = 'flex';
                btnToggleCompare.innerText = "Disable Compare Mode";
            } else {
                paneB.style.display = 'none';
                legendContainer.style.display = 'none';
                btnToggleCompare.innerText = "Enable Compare Mode";
            }
            updateAllVisuals();
        });

        // Setup Panes (A and B)
        ['A', 'B'].forEach(paneKey => {
            const upload = document.getElementById(`upload${paneKey}`);
            const download = document.getElementById(`download${paneKey}`);
            const editor = document.getElementById(`editor${paneKey}`);

            upload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                state[paneKey].fileName = file.name;
                document.getElementById(`title${paneKey}`).innerText = file.name; 
                const reader = new FileReader();
                reader.onload = (e) => {
                    editor.value = e.target.result;
                    parseEditor(paneKey);
                    updateAllVisuals();
                };
                reader.readAsText(file);
                upload.value = ''; 
            });

            download.addEventListener('click', () => {
                const blob = new Blob([editor.value], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = state[paneKey].fileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            });

            editor.addEventListener('input', () => {
                parseEditor(paneKey);
                updateAllVisuals();
            });
        });

        // --- CORE LOGIC ---
        function parseEditor(paneKey) {
            const text = document.getElementById(`editor${paneKey}`).value;
            let tempBinds = {};
            const lines = text.split('\n');
            for (let line of lines) {
                line = line.split('//')[0].trim();
                if (!line) continue;
                const match = line.match(/^bind\s+"?([^"\s]+)"?\s+"?(.*?)"?$/i);
                if (match) {
                    tempBinds[match[1].toLowerCase()] = match[2];
                }
            }
            state[paneKey].binds = tempBinds;
        }

        function getPossibleBindNames(keyElement) {
            let possibleBinds = [];
            const db = layoutsDB[layoutSwitch.value].keys;
            if (keyElement.classList.contains('dyn-key')) {
                const code = keyElement.getAttribute('data-code');
                if (scancodes[code]) possibleBinds.push(scancodes[code]);
                if (db[code]) possibleBinds = possibleBinds.concat(db[code].slice(1)); 
            } else {
                const staticBinds = keyElement.getAttribute('data-binds');
                if (staticBinds) possibleBinds = possibleBinds.concat(staticBinds.split(' '));
            }
            return possibleBinds;
        }

        function updateAllVisuals() {
            const layoutObj = layoutsDB[layoutSwitch.value];
            
            ['A', 'B'].forEach(pane => {
                const mk = document.querySelector(`#kbWrap${pane} .main-keyboard`);
                if (layoutObj.type === 'iso') {
                    mk.classList.remove('layout-ansi'); mk.classList.add('layout-iso');
                } else {
                    mk.classList.remove('layout-iso'); mk.classList.add('layout-ansi');
                }
                
                document.querySelectorAll(`#kbWrap${pane} .dyn-key`).forEach(key => {
                    const code = key.getAttribute('data-code');
                    key.innerText = layoutObj.keys[code] ? layoutObj.keys[code][0] : "";
                });
            });

            applyDiffStates();
        }

        function applyDiffStates() {
            ['A', 'B'].forEach(paneKey => {
                const otherPaneKey = paneKey === 'A' ? 'B' : 'A';
                const myBinds = state[paneKey].binds;
                const otherBinds = state[otherPaneKey].binds;
                const kbWrap = document.getElementById(state[paneKey].kbId);

                kbWrap.querySelectorAll('.key').forEach(keyElement => {
                    keyElement.className = keyElement.className.replace(/bound|diff-added|diff-conflict|diff-missing|diff-match/g, '').trim();
                    keyElement.removeAttribute('data-active-bind');
                    keyElement.removeAttribute('data-other-val');

                    const possibleBinds = getPossibleBindNames(keyElement);
                    let myVal = null, myName = null;
                    let otherVal = null;

                    for (let name of possibleBinds) {
                        if (myBinds[name.toLowerCase()]) {
                            myName = name.toLowerCase();
                            myVal = myBinds[myName];
                            break; 
                        }
                    }

                    if (state.compareMode) {
                        for (let name of possibleBinds) {
                            if (otherBinds[name.toLowerCase()]) {
                                otherVal = otherBinds[name.toLowerCase()];
                                if (!myName) myName = name.toLowerCase(); 
                                break; 
                            }
                        }
                    }

                    if (myVal) {
                        keyElement.setAttribute('data-active-bind', myName);
                        if (!state.compareMode) {
                            keyElement.classList.add('bound');
                        } else {
                            keyElement.setAttribute('data-other-val', otherVal || '');
                            if (!otherVal) {
                                keyElement.classList.add('diff-added');
                            } else if (myVal !== otherVal) {
                                keyElement.classList.add('diff-conflict');
                            } else {
                                keyElement.classList.add('diff-match');
                            }
                        }
                    } else if (state.compareMode && otherVal) {
                        keyElement.setAttribute('data-active-bind', myName);
                        keyElement.setAttribute('data-other-val', otherVal);
                        keyElement.classList.add('diff-missing');
                    }
                });
            });
        }

        // --- TOOLTIP LOGIC ---
        document.querySelectorAll('.keyboard-wrapper').forEach(wrapper => {
            wrapper.addEventListener('mousemove', (e) => {
                const keyElement = e.target.closest('.key');
                if (!keyElement || keyElement.classList.contains('hidden') || window.getComputedStyle(keyElement).display === 'none') {
                    tooltip.style.display = 'none'; return;
                }
                
                const paneKey = wrapper.id === 'kbWrapA' ? 'A' : 'B';
                const otherPaneKey = paneKey === 'A' ? 'B' : 'A';
                const activeName = keyElement.getAttribute('data-active-bind');
                const myVal = activeName ? state[paneKey].binds[activeName] : null;
                const otherVal = keyElement.getAttribute('data-other-val');

                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
                tooltip.style.display = 'block';

                if (!state.compareMode) {
                    if (myVal) tooltip.innerText = `bind "${activeName}" "${myVal}"\n\n(Click to edit)`;
                    else tooltip.innerText = `(Click to bind)`;
                } else {
                    let text = `Key: "${activeName || getPossibleBindNames(keyElement)[0]}"\n\n`;
                    text += `${state[paneKey].fileName}: ${myVal ? `"${myVal}"` : "[Unassigned]"}\n`;
                    text += `${state[otherPaneKey].fileName}: ${otherVal ? `"${otherVal}"` : "[Unassigned]"}\n\n`;
                    text += `(Click to edit ${state[paneKey].fileName})`;
                    tooltip.innerText = text;
                }
            });

            wrapper.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        });

        // --- MODAL EDITING LOGIC ---
        const modalOverlay = document.getElementById('bindModalOverlay');
        const modalBindInput = document.getElementById('modalBindInput');
        const compareQuickActions = document.getElementById('compareQuickActions');
        const btnCopyFromOther = document.getElementById('btnCopyFromOther');
        let currentEditingContext = null;

        document.querySelectorAll('.keyboard-wrapper').forEach(wrapper => {
            wrapper.addEventListener('click', (e) => {
                const keyElement = e.target.closest('.key');
                if (!keyElement || keyElement.classList.contains('hidden') || window.getComputedStyle(keyElement).display === 'none') return;
                
                tooltip.style.display = 'none';
                const paneKey = wrapper.id === 'kbWrapA' ? 'A' : 'B';
                const otherPaneKey = paneKey === 'A' ? 'B' : 'A';
                currentEditingContext = { keyElement, paneKey };
                
                let primaryName = "";
                if (keyElement.classList.contains('dyn-key')) {
                    const code = keyElement.getAttribute('data-code');
                    const db = layoutsDB[layoutSwitch.value].keys;
                    primaryName = (db[code] && db[code][1]) ? db[code][1] : scancodes[code];
                } else {
                    primaryName = keyElement.getAttribute('data-binds').split(' ')[0];
                }

                document.getElementById('modalTitle').innerText = `Edit Key: ${primaryName.toUpperCase()}`;
                document.getElementById('modalKeyInfo').innerText = `Engine Code: "${primaryName}"`;
                document.getElementById('modalPaneInfo').innerText = `Modifying: ${state[paneKey].fileName}`; 

                const myVal = state[paneKey].binds[primaryName] || keyElement.getAttribute('data-active-bind') && state[paneKey].binds[keyElement.getAttribute('data-active-bind')];
                modalBindInput.value = myVal || '';

                // Check for "Copy from other config" eligibility
                if (state.compareMode) {
                    let otherVal = null;
                    const possibleBinds = getPossibleBindNames(keyElement);
                    for (let name of possibleBinds) {
                        if (state[otherPaneKey].binds[name.toLowerCase()]) {
                            otherVal = state[otherPaneKey].binds[name.toLowerCase()];
                            break;
                        }
                    }
                    
                    if (otherVal) {
                        compareQuickActions.style.display = 'block';
                        btnCopyFromOther.innerText = `⏬ Copy from ${state[otherPaneKey].fileName} ("${otherVal}")`;
                        btnCopyFromOther.onclick = (event) => {
                            event.preventDefault();
                            modalBindInput.value = otherVal;
                            document.getElementById('btnSave').click(); // Auto-save on click
                        };
                    } else {
                        compareQuickActions.style.display = 'none';
                    }
                } else {
                    compareQuickActions.style.display = 'none';
                }
                
                modalOverlay.style.display = 'flex';
                modalBindInput.focus();
            });
        });

        document.getElementById('btnCancel').addEventListener('click', () => modalOverlay.style.display = 'none');
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.style.display = 'none'; });

        modalBindInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btnSave').click(); });

        document.getElementById('btnSave').addEventListener('click', () => {
            if (!currentEditingContext) return;
            modifyRawCFG(currentEditingContext.keyElement, currentEditingContext.paneKey, modalBindInput.value.trim() || null);
        });

        document.getElementById('btnUnbind').addEventListener('click', () => {
            if (!currentEditingContext) return;
            modifyRawCFG(currentEditingContext.keyElement, currentEditingContext.paneKey, null);
        });

        function modifyRawCFG(keyElement, paneKey, newCommand) {
            const editor = document.getElementById(state[paneKey].editorId);
            let lines = editor.value.split(/\r?\n/);
            const possibleBinds = getPossibleBindNames(keyElement).map(b => b.toLowerCase());
            
            let primaryName = "";
            if (keyElement.classList.contains('dyn-key')) {
                const code = keyElement.getAttribute('data-code');
                const db = layoutsDB[layoutSwitch.value].keys;
                primaryName = (db[code] && db[code][1]) ? db[code][1] : scancodes[code];
            } else {
                primaryName = keyElement.getAttribute('data-binds').split(' ')[0];
            }

            let newLines = [];
            let bindUpdated = false, unbindInjected = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let lineTrimmed = line.trim();
                
                if (lineTrimmed.toLowerCase().startsWith('unbind ')) {
                    const match = lineTrimmed.match(/^unbind\s+"?([^"\s]+)"?(\s*\/\/.*)?$/i);
                    if (match && possibleBinds.includes(match[1].toLowerCase())) continue; 
                }

                if (lineTrimmed.toLowerCase().startsWith('bind ')) {
                    const match = lineTrimmed.match(/^bind\s+"?([^"\s]+)"?\s+"?(.*?)"?(\s*\/\/.*)?$/i);
                    if (match && possibleBinds.includes(match[1].toLowerCase())) {
                        if (newCommand && !bindUpdated) {
                            let comment = match[3] || '';
                            newLines.push(`unbind "${primaryName}"`);
                            newLines.push(`bind "${primaryName}" "${newCommand}"${comment}`);
                            bindUpdated = true; unbindInjected = true;
                        } else if (!newCommand && !unbindInjected) {
                            newLines.push(`unbind "${primaryName}"`);
                            unbindInjected = true;
                        }
                        continue;
                    }
                }
                newLines.push(line);
            }

            if (newCommand && !bindUpdated) {
                if (newLines.length > 0 && newLines[newLines.length - 1].trim() !== '') newLines.push(""); 
                newLines.push(`unbind "${primaryName}"`);
                newLines.push(`bind "${primaryName}" "${newCommand}"`);
            } else if (!newCommand && !unbindInjected) {
                if (newLines.length > 0 && newLines[newLines.length - 1].trim() !== '') newLines.push(""); 
                newLines.push(`unbind "${primaryName}"`);
            }

            editor.value = newLines.join('\n');
            parseEditor(paneKey);
            updateAllVisuals();
            modalOverlay.style.display = 'none';
        }

        // Initialize
        updateAllVisuals();
    </script>
